<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0098ea" />
    <meta
      name="description"
      content="A re-skinnable Telegram Mini App storefront with TON (testnet) payments — catalog, cart, TON Connect checkout, and a live order-status timeline."
    />
    <!-- Link-preview card for when the URL is shared (e.g. pasted into a Telegram chat).
         Crawlers read these statically, so the copy is brand-neutral; the in-app title
         is set at runtime from brand.json. og:image must be an absolute URL. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Telegram Mini App Storefront" />
    <meta
      property="og:description"
      content="Re-skinnable Telegram Mini App storefront demo with TON (testnet) payments."
    />
    <meta property="og:url" content="https://tma-storefront-demo.pages.dev/" />
    <meta property="og:image" content="https://tma-storefront-demo.pages.dev/icon-180.png" />
    <meta name="twitter:card" content="summary" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <title>Storefront</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
